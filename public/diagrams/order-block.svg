<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="300" fill="#0b0b0c"/>
  <line x1="40" y1="260" x2="560" y2="260" stroke="#1c1c1e" stroke-width="1"/>
  <!-- last down candle before impulse (the OB) -->
  <rect x="160" y="130" width="60" height="10" y2="140" fill="#0a84ff"/>
  <line x1="190" y1="115" x2="190" y2="150" stroke="#0a84ff" stroke-width="2"/>
  <rect x="160" y="120" width="60" height="20" fill="#0a84ff"/>
  <!-- impulsive up move -->
  <line x1="220" y1="70" x2="220" y2="130" stroke="#f5f5f7" stroke-width="2"/>
  <rect x="200" y="70" width="40" height="60" fill="#f5f5f7"/>
  <line x1="280" y1="40" x2="280" y2="90" stroke="#f5f5f7" stroke-width="2"/>
  <rect x="260" y="40" width="40" height="50" fill="#f5f5f7"/>
  <!-- retrace back into OB zone -->
  <rect x="160" y="120" width="340" height="20" fill="#0a84ff" opacity="0.15"/>
  <line x1="300" y1="60" x2="470" y2="130" stroke="#8a8a8e" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="300" y="245" text-anchor="middle" fill="#8a8a8e" font-family="system-ui" font-size="16">Order Block</text>
</svg>
