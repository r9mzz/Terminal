<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="300" fill="#0b0b0c"/>
  <line x1="40" y1="260" x2="560" y2="260" stroke="#1c1c1e" stroke-width="1"/>
  <!-- candle 1 -->
  <line x1="150" y1="90" x2="150" y2="220" stroke="#8a8a8e" stroke-width="2"/>
  <rect x="130" y="120" width="40" height="70" fill="#8a8a8e"/>
  <!-- candle 2 (impulsive) -->
  <line x1="300" y1="40" x2="300" y2="150" stroke="#0a84ff" stroke-width="2"/>
  <rect x="280" y="50" width="40" height="90" fill="#0a84ff"/>
  <!-- candle 3 -->
  <line x1="450" y1="70" x2="450" y2="190" stroke="#8a8a8e" stroke-width="2"/>
  <rect x="430" y="90" width="40" height="70" fill="#8a8a8e"/>
  <!-- FVG zone between candle1 high(120) and candle3 low(160) -->
  <rect x="130" y="120" width="340" height="40" fill="#0a84ff" opacity="0.15"/>
  <line x1="130" y1="120" x2="470" y2="120" stroke="#0a84ff" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="130" y1="160" x2="470" y2="160" stroke="#0a84ff" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="300" y="245" text-anchor="middle" fill="#8a8a8e" font-family="system-ui" font-size="16">Fair Value Gap</text>
</svg>
